<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:      #FAF9F6;
    --ink:     #1A1A18;
    --ink-dim: #8A887F;
    --line:    #DEDBD2;
    --accent:  #B23A24;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'EB Garamond', monospace;
    padding:9vh 6vw;
    max-width:720px;
    margin:0 auto;
  }

  /* ---------- Header ---------- */
  header{
    margin-bottom:9vh;
  }
  h1{
    font-family:'EB Garamond', serif;
    font-weight:600;
    font-size:clamp(2.2rem, 6vw, 3rem);
    letter-spacing:-0.01em;
  }
  header p{
    margin-top:10px;
    font-size:0.82rem;
    color:var(--ink-dim);
    letter-spacing:0.03em;
  }

  /* ---------- File list ---------- */
  .files{
    border-top:1px solid var(--line);
  }

  details{
    border-bottom:1px solid var(--line);
  }

  summary{
    list-style:none;
    display:flex;
    align-items:center;
    gap:14px;
    padding:20px 4px;
    cursor:pointer;
    font-size:0.95rem;
    letter-spacing:0.02em;
    -webkit-tap-highlight-color:transparent;
  }
  summary::-webkit-details-marker{ display:none; }

  summary .icon{
    flex:none;
    width:15px; height:15px;
    stroke:var(--ink);
    transition:stroke .15s ease;
  }
  summary .name{ flex:1; }
  summary .count{
    color:var(--ink-dim);
    font-size:0.78rem;
  }
  summary .caret{
    color:var(--ink-dim);
    transition:transform .2s ease;
    font-size:0.8rem;
  }
  details[open] summary .caret{ transform:rotate(90deg); }

  summary:hover .name{ color:var(--accent); }
  summary:hover .icon{ stroke:var(--accent); }
  summary:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  /* ---------- Collection grid ---------- */
  .collection{
    padding:0 4px 30px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
  }
  .collection a{
    display:block;
    aspect-ratio:4/5;
    overflow:hidden;
    background:var(--line);
  }
  .collection img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    filter:grayscale(8%);
    transition:transform .5s ease, filter .3s ease;
  }
  .collection a:hover img{ transform:scale(1.04); filter:grayscale(0%); }

  /* ---------- Footer ---------- */
  footer{
    margin-top:9vh;
    padding-top:22px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    font-size:0.72rem;
    color:var(--ink-dim);
    letter-spacing:0.03em;
  }
  footer a{ color:var(--ink-dim); text-decoration:none; }
  footer a:hover{ color:var(--accent); }

  @media (max-width:520px){
    .collection{ grid-template-columns:repeat(2, 1fr); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
